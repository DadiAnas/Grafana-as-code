# =============================================================================
# BASE — Shared Service Accounts
# =============================================================================
# Entries here are deployed to ALL environments unless overridden in envs/<env>/.
#
# Each service account MUST specify orgId (numeric) to scope it to the right org.
#
# Example:
#   service_accounts:
#     - name: "terraform-automation"
#       role: "Admin"
#       orgId: 1
#       is_disabled: false
#
# Environment-specific overrides go in:
#   envs/<env>/service_accounts/<Org Name>/service_accounts.yaml
# =============================================================================

service_accounts: []
