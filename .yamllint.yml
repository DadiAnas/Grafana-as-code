# =============================================================================
# YAMLLINT CONFIGURATION
# =============================================================================
# Used by: make lint, CI/CD pipelines
# =============================================================================

extends: default

rules:
  line-length:
    max: 200
  truthy: disable
  document-start: disable
  comments:
    min-spaces-from-content: 1
  comments-indentation: disable
  # Indentation: disable enforcement because imported YAML files use compact
  # sequence style (- at same column as parent key) while hand-authored files
  # use indented sequences. Both are valid YAML; we don't reformat on import.
  indentation: disable

# Only lint YAML config files, not CI or other auto-generated files
ignore: |
  .terraform/
  .git/
  node_modules/
