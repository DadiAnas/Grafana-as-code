# Schema for: service_accounts/<Org>/service_accounts.yaml
service_accounts: list(include('service_account'), required=False)

---
service_account:
  name: str()
  orgId: int(required=False)
  org: str(required=False)
  role: enum('Viewer', 'Editor', 'Admin')
  is_disabled: bool(required=False)
  tokens: list(include('token'), required=False)

---
token:
  name: str()
  seconds_to_live: int(required=False)
