# Schema for: datasources/<Org>/datasources.yaml
# yamale v4 format: key is the actual YAML key, value is the validator
datasources: list(include('datasource'), required=False)

---
datasource:
  name: str()
  uid: str()
  type: str()
  url: str()
  orgId: int(required=False)
  org: str(required=False)
  is_default: bool(required=False)
  access_mode: str(required=False)
  basic_auth_enabled: bool(required=False)
  basic_auth_username: str(required=False)
  database_name: str(required=False)
  username: str(required=False)
  use_vault: bool(required=False)
  vault_secret_fields: str(required=False)
  http_headers: map(str(), str(), required=False)
  json_data: any(required=False)
  secure_json_data: any(required=False)
