# Imported from http://localhost:3000 on 2026-03-05T05:09:08.358076

apiVersion: 1
groups:
- name: "API"
  folder: "app-api"
  orgId: 4
  interval: "1m"
  rules:
  - title: "API Response Time High"
    condition: "C"
    for: "5m"
    annotations:
      description: "P95 response time is above 500ms"
      summary: "API response time is high"
    labels:
      severity: "warning"
      team: "application"
    noDataState: "NoData"
    execErrState: "Error"
    data:
    - refId: "A"
      queryType: ""
      relativeTimeRange:
        from: 600
        to: 0
      datasourceUid: "app-prometheus"
      model:
        expr: "histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket[5m]))\
          \ by (le))"
        intervalMs: 1000
        maxDataPoints: 43200
        refId: "A"
    - refId: "B"
      queryType: ""
      relativeTimeRange:
        from: 600
        to: 0
      datasourceUid: "__expr__"
      model:
        expression: "A"
        intervalMs: 1000
        maxDataPoints: 43200
        reducer: "mean"
        refId: "B"
        type: "reduce"
    - refId: "C"
      queryType: ""
      relativeTimeRange:
        from: 600
        to: 0
      datasourceUid: "__expr__"
      model:
        conditions:
        - evaluator:
            params:
            - 0.5
            type: "gt"
        expression: "B"
        intervalMs: 1000
        maxDataPoints: 43200
        refId: "C"
        type: "threshold"
