#
# Notification Policies define how alerts are routed to contact points.
# Format follows Grafana's provisioning API structure.

policies:
- orgId: 5
  receiver: "grafana-default-email"
  group_by:
  - "grafana_folder"
  - "alertname"
  group_wait: "30s"
  group_interval: "5m"
  repeat_interval: "4h"
