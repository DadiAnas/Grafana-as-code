# Imported from http://localhost:3000 on 2026-03-03T08:12:40+01:00

contactPoints:
  - name: app-email
    org: Application Team
    receivers:
    - type: email
      settings:
        addresses: app-team@example.com
        singleEmail: true
        subject: '[{{ .Status | toUpper }}] {{ .CommonLabels.alertname }}'
      disableResolveMessage: false
    # orgId: 3

  - name: app-webhook-npr
    org: Application Team
    receivers:
    - type: webhook
      settings:
        httpMethod: POST
        maxAlerts: 0
        url: https://hooks.app.example.com/npr/alerts
      disableResolveMessage: false
    # orgId: 3

  - name: grafana-default-email
    org: Application Team
    receivers:
    - type: email
      settings:
        addresses: <example@email.com>
        singleEmail: false
      disableResolveMessage: false
    # orgId: 3

  - name: grafana-default-email
    org: Business Intelligence
    receivers:
    - type: email
      settings:
        addresses: <example@email.com>
        singleEmail: false
      disableResolveMessage: false
    # orgId: 6

  - name: grafana-default-email
    org: Development
    receivers:
    - type: email
      settings:
        addresses: <example@email.com>
        singleEmail: false
      disableResolveMessage: false
    # orgId: 4

  - name: email-npr
    org: Main Org.
    receivers:
    - type: email
      settings:
        addresses: oncall-npr@example.com;platform-npr@example.com
        message: 'Environment: NPR
  
          {{ range .Alerts }}
  
          Alert: {{ .Labels.alertname }}
  
          Status: {{ .Status }}
  
          Severity: {{ .Labels.severity }}
  
          Summary: {{ .Annotations.summary }}
  
          Description: {{ .Annotations.description }}
  
          {{ if .Annotations.runbook_url }}Runbook: {{ .Annotations.runbook_url }}{{
          end }}
  
          {{ end }}
  
          '
        singleEmail: true
        subject: '[NPR] [{{ .Status | toUpper }}] {{ .CommonLabels.alertname }}'
      disableResolveMessage: false
    # orgId: 1

  - name: grafana-default-email
    org: Main Org.
    receivers:
    - type: email
      settings:
        addresses: <example@email.com>
        singleEmail: false
      disableResolveMessage: false
    # orgId: 1

  - name: webhook-npr
    org: Main Org.
    receivers:
    - type: webhook
      settings:
        authorization_credentials: '[REDACTED]'
        authorization_scheme: Bearer
        headers:
          Content-Type: application/json
        httpMethod: POST
        maxAlerts: 0
        url: https://api.npr.example.com/alerts
      disableResolveMessage: false
    # orgId: 1

  - name: grafana-default-email
    org: Platform Team
    receivers:
    - type: email
      settings:
        addresses: <example@email.com>
        singleEmail: false
      disableResolveMessage: false
    # orgId: 5

  - name: platform-email-npr
    org: Platform Team
    receivers:
    - type: email
      settings:
        addresses: platform-team-npr@example.com
        singleEmail: true
        subject: '[NPR-Platform] [{{ .Status | toUpper }}] {{ .CommonLabels.alertname
          }}'
      disableResolveMessage: false
    # orgId: 5

  - name: platform-webhook
    org: Platform Team
    receivers:
    - type: webhook
      settings:
        httpMethod: POST
        maxAlerts: 0
        url: https://api.platform.example.com/alerts
      disableResolveMessage: false
    # orgId: 5

  - name: platform-webhook-npr
    org: Platform Team
    receivers:
    - type: webhook
      settings:
        httpMethod: POST
        maxAlerts: 0
        url: https://hooks.platform.example.com/npr/alerts
      disableResolveMessage: false
    # orgId: 5

  - name: bi-email
