contactPoints:
- name: "email receiver"
  orgId: 2
  receivers:
  - type: "email"
    settings:
      addresses: "<example@email.com>"
    disableResolveMessage: false
- name: "grafana-default-email"
  orgId: 2
  receivers:
  - type: "email"
    settings:
      addresses: "<example@email.com>"
      singleEmail: false
    disableResolveMessage: false
- name: "platform-email-npr"
  orgId: 2
  receivers:
  - type: "email"
    settings:
      addresses: "platform-team-npr@example.com"
      singleEmail: true
      subject: "[NPR-Platform] [{{ .Status | toUpper }}] {{ .CommonLabels.alertname\
        \ }}"
    disableResolveMessage: false
- name: "platform-webhook"
  orgId: 2
  receivers:
  - type: "webhook"
    settings:
      httpMethod: "POST"
      maxAlerts: 0
      url: "https://api.platform.example.com/alerts"
      password: "VAULT_SECRET_REQUIRED"
      tlsClientCert: "VAULT_SECRET_REQUIRED"
      tlsClientKey: "VAULT_SECRET_REQUIRED"
      authorizationCredentials: "VAULT_SECRET_REQUIRED"
    vault_secrets: "\u26A0 Fill in Vault at grafana/dev/contact_points/platform-webhook:\
      \ password, tlsClientCert, tlsClientKey, authorizationCredentials"
    disableResolveMessage: false
- name: "platform-webhook-npr"
  orgId: 2
  receivers:
  - type: "webhook"
    settings:
      httpMethod: "POST"
      maxAlerts: 0
      url: "https://hooks.platform.example.com/npr/alerts"
      password: "VAULT_SECRET_REQUIRED"
      tlsClientCert: "VAULT_SECRET_REQUIRED"
      tlsClientKey: "VAULT_SECRET_REQUIRED"
      authorizationCredentials: "VAULT_SECRET_REQUIRED"
    vault_secrets: "\u26A0 Fill in Vault at grafana/dev/contact_points/platform-webhook-npr:\
      \ password, tlsClientCert, tlsClientKey, authorizationCredentials"
    disableResolveMessage: false
