contactPoints:
- name: "email receiver"
  org: "Platform Team"
  orgId: 5
  receivers:
  - type: "email"
    settings:
      addresses: "<example@email.com>"
      singleEmail: false
    disableResolveMessage: false
- name: "grafana-default-email"
  org: "Platform Team"
  orgId: 5
  receivers:
  - type: "email"
    settings:
      addresses: "<example@email.com>"
      singleEmail: false
    disableResolveMessage: false
- name: "platform-email-npr"
  org: "Platform Team"
  orgId: 5
  receivers:
  - type: "email"
    settings:
      addresses: "platform-team-npr@example.com"
      singleEmail: true
      subject: "[NPR-Platform] [{{ .Status | toUpper }}] {{ .CommonLabels.alertname\
        \ }}"
    disableResolveMessage: false
- name: "platform-webhook"
  org: "Platform Team"
  orgId: 5
  receivers:
  - type: "webhook"
    settings:
      httpMethod: "POST"
      maxAlerts: 0
      password: "[REDACTED]"
      url: "https://api.platform.example.com/alerts"
      tlsClientCert: "VAULT_SECRET_REQUIRED"
      tlsClientKey: "VAULT_SECRET_REQUIRED"
      authorizationCredentials: "VAULT_SECRET_REQUIRED"
    vault_secrets: "grafana/dev/alerting/contact-points/platform-webhook: tlsClientCert,\
      \ tlsClientKey, authorizationCredentials"
    disableResolveMessage: false
- name: "platform-webhook-npr"
  org: "Platform Team"
  orgId: 5
  receivers:
  - type: "webhook"
    settings:
      httpMethod: "POST"
      maxAlerts: 0
      password: "[REDACTED]"
      url: "https://hooks.platform.example.com/npr/alerts"
      tlsClientCert: "VAULT_SECRET_REQUIRED"
      tlsClientKey: "VAULT_SECRET_REQUIRED"
      authorizationCredentials: "VAULT_SECRET_REQUIRED"
    vault_secrets: "grafana/dev/alerting/contact-points/platform-webhook-npr: tlsClientCert,\
      \ tlsClientKey, authorizationCredentials"
    disableResolveMessage: false
- name: "empty"
  org: "Platform Team"
  orgId: 5
  receivers: []
