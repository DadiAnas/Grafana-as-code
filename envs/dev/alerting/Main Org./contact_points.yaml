# Imported from http://localhost:3000 on 2026-03-06T12:58:38.714162

contactPoints:
- name: "email receiver"
  org: "Main Org."
  orgId: 1
  receivers:
  - type: "email"
    settings:
      addresses: "<example@email.com>"
      singleEmail: false
    disableResolveMessage: false
- name: "email-npr"
  org: "Main Org."
  orgId: 1
  receivers:
  - type: "email"
    settings:
      addresses: "oncall-npr@example.com;platform-npr@example.com"
      message: "Environment: NPR {{ range .Alerts }} Alert: {{ .Labels.alertname }}\
        \ Status: {{ .Status }} Severity: {{ .Labels.severity }} Summary: {{ .Annotations.summary\
        \ }} Description: {{ .Annotations.description }} {{ if .Annotations.runbook_url\
        \ }}Runbook: {{ .Annotations.runbook_url }}{{ end }} {{ end }}"
      singleEmail: true
      subject: "[NPR] [{{ .Status | toUpper }}] {{ .CommonLabels.alertname }}"
    disableResolveMessage: false
- name: "grafana-default-email"
  org: "Main Org."
  orgId: 1
  receivers:
  - type: "email"
    settings:
      addresses: "<example@email.com>"
      singleEmail: false
    disableResolveMessage: false
- name: "webhook-npr"
  org: "Main Org."
  orgId: 1
  receivers:
  - type: "webhook"
    settings:
      authorization_credentials: "[REDACTED]"
      authorization_scheme: "Bearer"
      headers:
        Content-Type: "application/json"
      httpMethod: "POST"
      maxAlerts: 0
      password: "[REDACTED]"
      url: "https://api.npr.example.com/alerts"
      tlsClientCert: "VAULT_SECRET_REQUIRED"
      tlsClientKey: "VAULT_SECRET_REQUIRED"
      authorizationCredentials: "VAULT_SECRET_REQUIRED"
    vault_secrets: "grafana/dev/alerting/contact-points/webhook-npr: tlsClientCert,\
      \ tlsClientKey, authorizationCredentials"
    disableResolveMessage: false
- name: "empty"
  org: "Main Org."
  orgId: 1
  receivers: []
