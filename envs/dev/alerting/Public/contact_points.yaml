# contact_points per org

contactPoints:
- name: bi-email
  org: Public
  receivers:
  - type: email
    settings:
      addresses: bi-team@example.com;analysts@example.com
      singleEmail: false
    disableResolveMessage: false
- name: grafana-default-email
  org: Public
  receivers:
  - type: email
    settings:
      addresses: <example@email.com>
      singleEmail: false
    disableResolveMessage: false
