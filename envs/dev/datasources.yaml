# Imported from http://localhost:3000 on 2026-03-03T08:12:38+01:00

datasources:
  - name: "App-Prometheus"
    uid: "app-prometheus"
    type: "prometheus"
    url: "http://prometheus.apps.local:9090"
    org: "Application Team"
    orgId: 3
    access: "proxy"
    is_default: true
    json_data:
      httpMethod: POST
      timeInterval: 15s

  - name: "BI-PostgreSQL"
    uid: "bi-postgres"
    type: "grafana-postgresql-datasource"
    url: "postgres.bi.local:5432"
    org: "Business Intelligence"
    orgId: 6
    access: "proxy"
    is_default: true
    json_data:
      database: analytics
      maxOpenConns: 100
      sslmode: require

  - name: "Elasticsearch"
    uid: "elasticsearch"
    type: "elasticsearch"
    url: "http://elasticsearch-npr.example.com:9200"
    org: "Main Org."
    orgId: 1
    access: "proxy"
    is_default: false
    json_data:
      esVersion: 8.0.0
      logLevelField: level
      logMessageField: message
      timeField: '@timestamp'

  - name: "InfluxDB"
    uid: "influxdb"
    type: "influxdb"
    url: "http://influxdb-npr.example.com:8086"
    org: "Main Org."
    orgId: 1
    access: "proxy"
    is_default: false
    json_data:
      defaultBucket: my-bucket
      organization: my-org
      version: Flux

  - name: "Loki"
    uid: "loki"
    type: "loki"
    url: "http://loki-npr.example.com:3100"
    org: "Main Org."
    orgId: 1
    access: "proxy"
    is_default: false
    json_data:
      maxLines: 1000

  - name: "My Prometheus"
    uid: "prometheus-main"
    type: "prometheus"
    url: "http://prometheus:9090"
    org: "Main Org."
    orgId: 1
    access: "proxy"
    is_default: true
    json_data:
      httpMethod: POST
      queryTimeout: 60s
      timeInterval: 15s
    http_headers:
      "X-Custom-Header": ""

  - name: "PostgreSQL"
    uid: "postgres"
    type: "grafana-postgresql-datasource"
    url: "postgres-npr.example.com:5432"
    org: "Main Org."
    orgId: 1
    access: "proxy"
    is_default: false
    json_data:
      connMaxLifetime: 14400
      database: grafana_npr
      maxIdleConns: 50
      maxOpenConns: 50
      sslmode: disable

  - name: "Tempo"
    uid: "tempo"
    type: "tempo"
    url: "http://tempo-npr.example.com:3200"
    org: "Main Org."
    orgId: 1
    access: "proxy"
    is_default: false
    json_data:
      nodeGraph: '{''enabled'': True}'
      serviceMap: '{''datasourceUid'': ''prometheus''}'
      tracesToLogsV2: '{''datasourceUid'': ''loki'', ''filterBySpanID'': True, ''filterByTraceID'':
        True, ''spanEndTimeShift'': ''1h'', ''spanStartTimeShift'': ''-1h''}'
      tracesToMetrics: '{''datasourceUid'': ''prometheus'', ''spanEndTimeShift'': ''1h'',
        ''spanStartTimeShift'': ''-1h''}'

  - name: "Debug-Prometheus"
    uid: "debug-prometheus"
    type: "prometheus"
    url: "http://prometheus-debug-npr.example.com:9090"
    org: "Platform Team"
    orgId: 5
    access: "proxy"
    is_default: false
    json_data:
      httpMethod: POST
      timeInterval: 5s

  - name: "Platform-Loki"
    uid: "platform-loki"
    type: "loki"
    url: "http://loki.platform.local:3100"
    org: "Platform Team"
    orgId: 5
    access: "proxy"
    is_default: false
    json_data:
      maxLines: 1000

  - name: "Platform-Prometheus"
    uid: "platform-prometheus"
    type: "prometheus"
    url: "http://prometheus.platform.local:9090"
    org: "Platform Team"
    orgId: 5
    access: "proxy"
    is_default: true
    json_data:
      httpMethod: POST
      timeInterval: 15s

  - name: "Public-Metrics"
    uid: "public-prometheus"
    type: "prometheus"
    url: "http://prometheus.public.local:9090"
    org: "Public"
    orgId: 2
    access: "proxy"
    is_default: true
    json_data:
      httpMethod: GET
      timeInterval: 60s

