# contact_points per org

contactPoints:
- name: grafana-default-email
  org: Platform Team
  receivers:
  - type: email
    settings:
      addresses: <example@email.com>
      singleEmail: false
    disableResolveMessage: false
- name: platform-email-npr
  org: Platform Team
  receivers:
  - type: email
    settings:
      addresses: platform-team-npr@example.com
      singleEmail: true
      subject: '[NPR-Platform] [{{ .Status | toUpper }}] {{ .CommonLabels.alertname
        }}'
    disableResolveMessage: false
- name: platform-webhook
  org: Platform Team
  receivers:
  - type: webhook
    settings:
      httpMethod: POST
      maxAlerts: 0
      url: https://api.platform.example.com/alerts
    disableResolveMessage: false
- name: platform-webhook-npr
  org: Platform Team
  receivers:
  - type: webhook
    settings:
      httpMethod: POST
      maxAlerts: 0
      url: https://hooks.platform.example.com/npr/alerts
    disableResolveMessage: false
