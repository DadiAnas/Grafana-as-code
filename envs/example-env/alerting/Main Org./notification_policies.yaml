# notification_policies per org

policies:
- org: Main Org.
  receiver: grafana-default-email
  group_by:
  - grafana_folder
  - alertname
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  routes:
  - receiver: email-npr
    group_by:
    - grafana_folder
    - alertname
    object_matchers:
    - - sdfds
      - '='
      - sdfds
    continue: true
    group_wait: 5m
    group_interval: 3s
    repeat_interval: 20s
